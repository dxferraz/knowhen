name: knowhen
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^4.9.0
  firebase_analytics: ^12.4.1
  firebase_auth: ^6.5.1
  intl: ^0.20.2
  google_fonts: ^8.1.0
  fluttertoast: ^9.0.0
  smooth_page_indicator: ^2.0.1
  google_sign_in: ^7.2.0
  auto_route: ^11.1.0
  firebase_storage: ^13.4.1
  cloud_firestore: ^6.4.1
  json_annotation: ^4.12.0
  flutter_bloc: ^9.0.0
  flutter_svg: ^2.1.0
  hugeicons: ^1.1.7
  shared_preferences: ^2.4.0
  envied: ^1.1.0
  fal_client: ^0.3.0
  http: ^1.3.0
  provider: ^6.1.2
  date_picker_plus: ^7.0.0
  google_mobile_ads: ^8.0.0
  equatable: ^2.0.7
  hexcolor: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  auto_route_generator: ^10.5.0
  json_serializable: ^6.9.3
  flutter_lints: ^6.0.0
  envied_generator: ^1.1.0
  flutter_launcher_icons: ^0.14.3
  build_runner: ^2.15.0

flutter_icons:
  android: true
  ios: true
  image_path: "lib/assets/launcher/icon.png"
  adaptive_icon_background: "#14142B"
  adaptive_icon_foreground: "lib/assets/launcher/icon_foreground.png"

flutter:
  uses-material-design: true
  generate: true

assets:
  - assets/
